name: Build and Sync to Hugging Face Space

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時自動觸發 (可按需要修改)
  workflow_dispatch:       # 支援喺 GitHub 網頁手動 Click 粒掣 Trigger
  push:
    branches:
      - main

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas requests plotly scikit-learn openpyxl

      - name: 🚀 Run Dashboard Build Script
        run: |
          python build_report.py

     - name: 💾 Commit to GitHub Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將更新嘅 HTML、地圖數據，以及匯出嘅 Excel 檔加入
          git add index.html data/ai_paths.geojson data/typhoon_predictions.xlsx || true
          
          # 檢查是否有檔案被更新
          if ! git diff --staged --quiet; then
            git commit -m "auto: update dashboard report and AI map"
            # 🔥 關鍵修復：加入 -X theirs，強制以 Action 剛剛生成的新檔案覆蓋任何衝突
            git pull --rebase -X theirs origin main
            git push
          else
            echo "✅ 沒有新的數據需要更新"
          fi

      - name: 🔥 Push Direct to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # ⚠️ 記得喺下面改返你嘅 Hugging Face 用戶名同 Space 名稱！
          HF_USERNAME: "Ozymand1az"
          HF_SPACE_NAME: "hk-typhoon-early-warning"
        run: |
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/Ozymand1az/hk-typhoon-early-warning
