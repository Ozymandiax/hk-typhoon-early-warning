name: Update Typhoon Forecast Webpage

on:
  schedule:
    - cron: '0 */12 * * *'  # 每天每 12 小時自動更新
  workflow_dispatch:      # 允許手動點擊按鈕立即執行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install pandas numpy plotly requests

    - name: Run Multi-Model Integration Script
      run: python build_report.py

    - name: Deploy index.html to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "bot@github.com"
        git config --global user.name "GitHub Action Bot"
        
        # 替換為你的真實 HF 帳戶名和 Space 名
        git clone https://oauth:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Ozymand1az/hk-typhoon-early-warning hf_space
        
        cp index.html hf_space/index.html
        cd hf_space
        git add index.html
        git commit -m "Update multi-model typhoon forecast: $(date)" || exit 0
        git push origin main
