name: Auto Build Dashboard & AI Map

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小時自動更新一次
  workflow_dispatch:       # 支援喺 GitHub 網頁手動 Click 按鈕 Trigger
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Build Script
        run: |
          python build_report.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/ai_paths.geojson
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update dashboard report and AI map" && git push)
